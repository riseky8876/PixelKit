name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # allow manual trigger

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Setup Java ────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Setup Node ────────────────────────────────
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'


      # ── Install dependencies ──────────────────────
      - name: Install npm dependencies
        run: npm install

      # ── Setup Android SDK ─────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── Cache Gradle ──────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── Make gradlew executable ───────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── Build debug APK ───────────────────────────
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ── Upload APK artifact ───────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PixelKit-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Build Release APK (if keystore secrets exist) ──
      - name: Check keystore secret
        id: check_keystore
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "has_keystore=true" >> $GITHUB_OUTPUT
          else
            echo "has_keystore=false" >> $GITHUB_OUTPUT
          fi
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build Release APK
        if: steps.check_keystore.outputs.has_keystore == 'true'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          MYAPP_UPLOAD_STORE_FILE: release.keystore
          MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK
        if: steps.check_keystore.outputs.has_keystore == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: PixelKit-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # ── Create GitHub Release on tag ──────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
          name: PixelKit ${{ github.ref_name }}
          body: |
            ## PixelKit ${{ github.ref_name }}
            
            ### Fitur
            - 🎨 Colorize foto B&W (AI via Hugging Face)
            - ✨ AI Upscale resolusi
            - ⚡ Enhance & sharpen
            - ↔️ Resize & crop
            - 🔄 Convert format
            - 🅰️ ASCII Art studio
            - ▣ QR Code generator
            - 🌈 Filter & efek
            
            ### Cara install
            1. Download APK di bawah
            2. Aktifkan "Install dari sumber tidak dikenal" di Settings
            3. Install APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
